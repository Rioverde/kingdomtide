version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: standard
  enable:
    - bodyclose
    - cyclop
    - durationcheck
    - gocognit
    - gocritic
    - gocyclo
    - intrange
    - misspell
    - mnd
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - noctx
          - gocognit
          - cyclop
          - mnd
      # Procedural-generation ports. Algorithm constants (noise scales, hash
      # salts, bit-widths) read as MND and inflate cognitive/cyclomatic
      # complexity; they are not arbitrary magic.
      - path: internal/game/worldgen/.*\.go$
        linters:
          - mnd
          - gocognit
          - gocyclo
          - cyclop
    paths:
      - .cache
      - .artifacts
  settings:
    cyclop:
      max-complexity: 15
      package-average: 10
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 15
    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "10"
        - "20"
        - "60"
        - "100"
        - "500"
        - "1000"
    gocritic:
      enabled-tags:
        - performance
        - style
        - diagnostic
      disabled-checks:
        - paramTypeCombine
        - hugeParam
        - ifElseChain
        - tooManyResultsChecker
        - unnamedResult
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
    staticcheck:
      checks:
        - all

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
    goimports:
      local-prefixes:
        - github.com/Rioverde/gongeons
