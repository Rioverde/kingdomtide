# -----------------------------------------------------------------------------
# Region name composition (Phase 3). The Parts record produced by the naming
# package carries a Body, a Format tag, and two catalog indices. The client
# resolves region.name.* and region.prefix.* to turn those into display text.
# Counts match worldgen.regionBounds — any change here MUST update that map.
# -----------------------------------------------------------------------------

# FormatCharacterPrefix template: "<prefix> <body>".
[region.name.character_prefix]
other = "{{.Prefix}} {{.Body}}"

# Character prefix catalogs — 5 entries per character. Indexed by PrefixIndex
# via region.prefix.<character>.<index>. Values are adjectives that read well
# in front of a Markov-generated geographic noun.
[region.prefix.normal.0]
other = "The Old"
[region.prefix.normal.1]
other = "Greater"
[region.prefix.normal.2]
