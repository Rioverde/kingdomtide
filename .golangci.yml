version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: standard
  enable:
    - bodyclose
    - cyclop
    - durationcheck
    - gocognit
    - gocritic
    - gocyclo
    - intrange
    - misspell
    - mnd
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - noctx
          - gocognit
          - cyclop
          - mnd
      # Procedural-generation ports. Algorithm constants (noise scales, hash
      # salts, bit-widths) read as MND and inflate cognitive/cyclomatic
      # complexity; they are not arbitrary magic.
      - path: internal/game/worldgen/(noise|generator|biome|poi|rivers|chunk|cache)\.go$
        linters:
          - mnd
          - gocognit
          - gocyclo
          - cyclop
      # superchunk.go uses splitmix64 / golden-ratio hash constants and
      # AnchorOf bit-extraction (shift by 32) — all are documented algorithm
      # parameters, not arbitrary literals.
      - path: internal/game/superchunk\.go$
        linters:
          - mnd
      # region_source.go uses per-influence hex seed salts and float32 noise
      # persistence/lacunarity values that are tuning parameters, not magic.
      - path: internal/game/worldgen/region_source\.go$
        linters:
          - mnd
      # WIP test files are user's in-progress work — excluded to keep lint
      # output focused on shipped code.
      - path: internal/game/worldgen/(rivers|ridges|continents|lake|bench).*_test\.go$
        linters:
          - gofmt
          - staticcheck
          - intrange
          - mnd
    paths:
      - .cache
      - .artifacts
  settings:
    cyclop:
      max-complexity: 15
      package-average: 10
    gocognit:
      min-complexity: 30
    gocyclo:
      min-complexity: 15
    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "4"
        - "5"
        - "10"
        - "20"
        - "60"
        - "100"
        - "500"
        - "1000"
    gocritic:
      enabled-tags:
        - performance
        - style
        - diagnostic
      disabled-checks:
        - paramTypeCombine
        - hugeParam
        - ifElseChain
        - tooManyResultsChecker
        - unnamedResult
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
    staticcheck:
      checks:
        - all

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      # WIP test files — user's in-progress work, not shipped yet.
      - internal/game/worldgen/rivers_test\.go
      - internal/game/worldgen/ridges_test\.go
      - internal/game/worldgen/continents_test\.go
      - internal/game/worldgen/lake_test\.go
      - internal/game/worldgen/bench_test\.go
  settings:
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"
    goimports:
      local-prefixes:
        - github.com/Rioverde/gongeons
