syntax = "proto3";

package gongeons.v1;

option go_package = "github.com/Rioverde/gongeons/internal/proto;gongeonspb";

// GameService is the bidirectional stream between client and server.
// Each client opens exactly one Play stream for the lifetime of its session.
service GameService {
  // Play is a bidirectional stream. The client opens it, sends a JoinRequest
  // first, then a sequence of commands. The server replies with JoinAccepted
  // + a Snapshot on join and Event messages thereafter.
  rpc Play(stream ClientMessage) returns (stream ServerMessage);
}

// Position is an absolute square-grid tile coordinate. Origin is arbitrary
// (world 0, 0); the coordinate system is unbounded in both axes.
message Position {
  int32 x = 1;
  int32 y = 2;
}

// Terrain is the biome of a tile. One value per domain terrain, so the
// client can render every biome distinctly without asking the server for
// side-channel info.
enum Terrain {
  TERRAIN_UNSPECIFIED = 0;
  TERRAIN_PLAINS      = 1;
  TERRAIN_GRASSLAND   = 2;
  TERRAIN_MEADOW      = 3;
  TERRAIN_BEACH       = 4;
  TERRAIN_DESERT      = 5;
  TERRAIN_SAVANNA     = 6;
  TERRAIN_FOREST      = 7;
  TERRAIN_JUNGLE      = 8;
  TERRAIN_TAIGA       = 9;
  TERRAIN_TUNDRA      = 10;
  TERRAIN_SNOW        = 11;
  TERRAIN_HILLS       = 12;
  TERRAIN_MOUNTAIN    = 13;
  TERRAIN_SNOWY_PEAK  = 14;
  TERRAIN_OCEAN       = 15;
  TERRAIN_DEEP_OCEAN  = 16;
}

// OccupantKind distinguishes entities on a tile. OCCUPANT_MONSTER is reserved
// for future gameplay work — the current MVP only uses OCCUPANT_PLAYER.
enum OccupantKind {
  OCCUPANT_UNSPECIFIED = 0;
  OCCUPANT_PLAYER      = 1;
  OCCUPANT_MONSTER     = 2;
}

// Structure is a single built feature on a tile — mutually exclusive.
// Binary overlay features (river, road, bridge...) go in Tile.overlays.
enum Structure {
  STRUCTURE_UNSPECIFIED = 0;
  STRUCTURE_VILLAGE     = 1;
  STRUCTURE_CASTLE      = 2;
}

// LandmarkKind identifies a natural or ancient landmark on a tile. Matches
// internal/game/LandmarkKind bit-for-bit so landmarkKindPB in
// internal/server/mapper.go is a pure cast. Landmarks are a separate layer
// from Structure: a Structure is a civilization artifact (village, castle)
// while a Landmark is a geographic or pre-civilization marker (tower on a
// peak, shrine in a holy region) that exists independent of any faction.
// Zero value LANDMARK_KIND_NONE = no landmark on this tile.
enum LandmarkKind {
  LANDMARK_KIND_NONE            = 0;
  LANDMARK_KIND_TOWER           = 1;
  LANDMARK_KIND_GIANT_TREE      = 2;
  LANDMARK_KIND_STANDING_STONES = 3;
  LANDMARK_KIND_OBELISK         = 4;
  LANDMARK_KIND_CHASM           = 5;
  LANDMARK_KIND_SHRINE          = 6;
}

// RegionCharacter is the dominant thematic identity of a Voronoi region
// cell. Matches the internal/game/RegionCharacter enum bit-for-bit so
// regionCharacterPB in internal/server/mapper.go is a pure cast.
enum RegionCharacter {
  REGION_CHARACTER_NORMAL   = 0;
  REGION_CHARACTER_BLIGHTED = 1;
  REGION_CHARACTER_FEY      = 2;
  REGION_CHARACTER_ANCIENT  = 3;
  REGION_CHARACTER_SAVAGE   = 4;
  REGION_CHARACTER_HOLY     = 5;
  REGION_CHARACTER_WILD     = 6;
}

// NameFormat selects which composition template the client uses to
// render a NameParts record. Matches the naming/parts.Format enum
// bit-for-bit so the conversion is a pure cast. Do not renumber —
// legacy clients would misinterpret the format on version skew.
enum NameFormat {
  NAME_FORMAT_UNSPECIFIED      = 0;
  NAME_FORMAT_BODY_ONLY        = 1;
  NAME_FORMAT_CHARACTER_PREFIX = 2;
  NAME_FORMAT_KIND_PATTERN     = 3;
}

// NameParts is the language-agnostic structured name carried on every
// named entity (Region, Landmark, future Settlement). The client
// composes the final display string locally: it looks up the template
// for the chosen Format in its locale catalog under the domain-specific
// namespace and fills in Body by seeding its embedded Markov corpus
// with body_seed. No body text travels the wire — the server stays
// language-agnostic while the client renders en/ru/etc.
message NameParts {
  string     character     = 1;
  string     sub_kind      = 2;
  NameFormat format        = 3;
  uint32     prefix_index  = 4;
  uint32     pattern_index = 5;
  int64      body_seed     = 6;
}

// Landmark is a structured landmark record carried on Tile. Kind picks
// the glyph and affinity rules; Name is composed into a display string
// client-side from the NameParts plus a locale catalog.
message Landmark {
  LandmarkKind kind = 1;
  NameParts    name = 2;
}

// RegionInfluence mirrors the game-side struct. Sent to clients so they
// can reason about sub-dominant influences (e.g. a Fey region with
// significant Ancient undertones) and blend per-tile tints without
// round-tripping the server.
message RegionInfluence {
  float blight  = 1;
  float fae     = 2;
  float ancient = 3;
  float savage  = 4;
  float holy    = 5;
  float wild    = 6;
}

// Region carries anchor-level character, name, and influence for the
// Voronoi cell containing the receiving player. Anchor position is NOT
// on the wire — clients derive it via AnchorOf(world_seed, {super_chunk_x,
// super_chunk_y}). The world seed is delivered once in JoinAccepted.
//
// Tag 3 previously held a flat `string name` rendered server-side. It
// is reserved so future proto evolutions cannot accidentally reuse it
// with a different type; the structured name lives at tag 6.
message Region {
  int32           super_chunk_x = 1;
  int32           super_chunk_y = 2;
  reserved 3;
  RegionCharacter character     = 4;
  RegionInfluence influence     = 5;
  NameParts       name          = 6;
}

// LocalizedMessage is the server-to-client envelope for localized errors
// and events. The server emits a stable message_id (catalog key) plus
// template args; the client renders the final string through its i18n
// bundle keyed on the player's language. Server logs still carry the
// English Status message for developer diagnostics.
message LocalizedMessage {
  string              message_id = 1;
  map<string, string> args       = 2;
}

// Tile is an atomic map cell. Used in Snapshot only — Events carry deltas,
// not full tile replacements. overlays is a bitmask of TileOverlay flag
// values shared with the domain (river, road, bridge, path...).
//
// Historical: fields 4 and 5 previously held `bool river` and
// `WorldObject object`. They were re-typed to uint32 + Structure during
// the overlay-bitmask refactor; the slot numbers were deliberately
// reused. Do not reintroduce the old field names on different slots —
// future overlays should get fresh numbers (6, 7, ...).
message Tile {
  Terrain      terrain   = 1;
  OccupantKind occupant  = 2;
  string       entity_id = 3; // occupant ID, empty if no occupant
  // overlays is a bitmask of yes/no tile features (river, road, bridge,
  // path...). Bit values are defined in Go as TileOverlay constants in
  // internal/game/overlay.go:
  //   bit 0 (value 1)  = OverlayRiver
  //   bit 1 (value 2)  = OverlayRoad
  //   bit 2 (value 4)  = OverlayBridge
  //   bit 3 (value 8)  = OverlayPath
  // Bits 4-31 are reserved for future overlays. Keep overlay.go and this
  // comment in lockstep when adding a new flag.
  uint32       overlays  = 4;
  Structure    structure = 5; // village / castle overlay
  // Tag 6 previously carried a bare LandmarkKind enum. It is reserved
  // so future evolutions cannot accidentally reuse it with a different
  // type; the structured landmark lives at tag 7.
  reserved 6;
  // landmark is the natural or ancient landmark on this tile, or nil
  // when nothing is placed. Landmark is a separate layer from
  // structure — see the LandmarkKind enum comment above.
  Landmark     landmark  = 7;
}

// Entity is a positioned actor in the world. Combat stats / monsters are
// added in a later phase on top of this shape.
message Entity {
  string       id       = 1;
  string       name     = 2;
  OccupantKind kind     = 3;
  Position     position = 4;
}

// ---- Client -> Server ----

message ClientMessage {
  oneof payload {
    JoinRequest join     = 1;
    MoveCmd     move     = 2;
    ViewportCmd viewport = 3;
  }
}

// CoreStats mirrors game.CoreStats for the join handshake. The client
// sends the six D&D 5e ability scores the player assembled during
// character creation (CS4); the server validates the Point Buy 27 budget
// before accepting and rejects a bad distribution with error.invalid_stats.
// When the whole message is omitted the server substitutes a neutral
// baseline (all 10s) so legacy clients keep working.
message CoreStats {
  int32 strength     = 1;
  int32 dexterity    = 2;
  int32 constitution = 3;
  int32 intelligence = 4;
  int32 wisdom       = 5;
  int32 charisma     = 6;
}

// JoinRequest is the first message a client sends. The server assigns a
// PlayerID in JoinAccepted and begins broadcasting events to this stream.
// viewport_width and viewport_height are the desired Snapshot dimensions
// for this client; zero means "use server defaults". language is the
// client's preferred locale as a BCP 47 tag (e.g. "en", "ru"); empty
// means the server picks "en" as default — locale catalog wiring is handled
// server-side. stats carries the character's D&D 5e ability distribution;
// omit it (or send zeroes) to get the server's neutral fallback.
message JoinRequest {
  string    name            = 1;
  int32     viewport_width  = 2;
  int32     viewport_height = 3;
  string    language        = 4;
  CoreStats stats           = 5;
}

// ViewportCmd updates the Snapshot dimensions the server should use for
// this client — the terminal resized, we want a bigger / smaller view.
// The server replies with a fresh Snapshot at the new size.
message ViewportCmd {
  int32 width  = 1;
  int32 height = 2;
}

// MoveCmd asks to move one step. dx/dy are in {-1, 0, 1}; exactly one is
// non-zero (four-directional movement via WASD).
message MoveCmd {
  int32 dx = 1;
  int32 dy = 2;
}

// ---- Server -> Client ----

message ServerMessage {
  oneof payload {
    JoinAccepted  accepted = 1;
    Snapshot      snapshot = 2;
    Event         event    = 3;
    ErrorResponse error    = 4;
  }
}

// JoinAccepted is the server's reply to JoinRequest. It carries the generated
// PlayerID and the player's spawn position — the client stores the ID and
// uses it to recognise its own events. world_seed is forwarded so the
// client can construct a local region source for per-tile influence
// sampling (cosmetic only, not authoritative state).
message JoinAccepted {
  string   player_id  = 1;
  Position spawn      = 2;
  int64    world_seed = 3;
}

// Snapshot is a viewport of the world. Width/height are tile counts; origin
// is the world-space position of the top-left tile. Tiles are row-major of
// length width*height.
message Snapshot {
  int32           width    = 1;
  int32           height   = 2;
  Position        origin   = 3;
  repeated Tile   tiles    = 4;
  repeated Entity entities = 5;
  // region at this player's position (per-player, not shared). Clients
  // use it for status-bar rendering, tint, and boundary-crossing events.
  Region          region   = 6;
  // self_energy is the receiving player's current Energy counter for the
  // tick system. int32 because proto has no native int; domain values
  // are always non-negative. Private to the snapshot subject — never sent
  // in broadcasts to other players.
  int32           self_energy      = 7;
  // self_energy_cost is the Energy required to perform a standard action
  // (BaseActionCost = 12). Sent as a constant so the client can render
  // the denominator of the energy bar (e.g. "8/12") without hard-coding
  // the server constant.
  int32           self_energy_cost = 8;
}

// Event is a domain event the server broadcasts to every connected client.
// The client applies it to its local Model to stay in sync.
message Event {
  oneof payload {
    PlayerJoined player_joined = 1;
    PlayerLeft   player_left   = 2;
    EntityMoved  entity_moved  = 3;
    IntentFailed intent_failed = 4;
  }
}

message PlayerJoined {
  Entity entity = 1;
}

message PlayerLeft {
  string player_id = 1;
}

message EntityMoved {
  string   entity_id = 1;
  Position from      = 2;
  Position to        = 3;
}

// IntentFailed reports that an entity's pending intent (MoveIntent, future
// AttackIntent, ...) could not resolve at Tick time — destination blocked,
// target dead, etc. Energy is NOT deducted on the server (refund
// semantics): the intent slot is cleared so the entity becomes idle and
// its next input is free. reason is a stable locale catalog key (e.g.
// "error.intent.move_blocked"); the client renders the player-facing text
// via its i18n bundle, keeping the wire language-agnostic.
message IntentFailed {
  string entity_id = 1;
  string reason    = 2;
}

message ErrorResponse {
  string message = 1;
  string code    = 2;
}
